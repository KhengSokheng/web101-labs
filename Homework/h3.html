<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Checker</title>
    <link rel="stylesheet" href="h3.css">
</head>
<body>

<div class="card">
    <h1>Grade Checker</h1>

    <div class="input-group">
        <input type="number" id="score" min="0" max="100" placeholder="Enter Score">

        <button onclick="checkGrade()">
            Check
        </button>
    </div>

    <h2 id="result"></h2>
</div>

<script src="h3.js"></script>

</body>
</html>
